<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home 💗</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">

<header class="home-top-header">
    <div class="home-header-content">
        <span class="home-header-title">らぶめろぅ～</span>
    </div>
    <button id="open-menu-btn" class="menu-open-button">MENU</button>
</header>

<div id="menu-modal" class="menu-overlay">
    <div class="menu-window">
        <h2 class="menu-title">Menu</h2>
        <ul class="menu-list">
            <li><a href="home.html" class="current">ホーム</a></li>
            <li><a href="#">次のデート</a></li>
            <li><a href="#">行きたいところ</a></li>
            <li><a href="#">思い出</a></li>
            <li><a href="#">目標</a></li>
            <li><a href="#">貯金</a></li>
            <li><a href="#">プロフ</a></li>
            <li><a href="#">お問い合わせ</a></li>
        </ul>
        <button id="close-btn" class="close-circle">×</button>
    </div>
</div>
<div class="bottom-header"></div>
<script>
    const openBtn = document.getElementById('open-menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const menuModal = document.getElementById('menu-modal');

    // MENUボタンを押したら開く！
    openBtn.addEventListener('click', () => {
        menuModal.style.display = 'flex';
    });

    // 閉じるボタン（×）を押したら隠す！
    closeBtn.addEventListener('click', () => {
        menuModal.style.display = 'none';
    });

    // 背景のピンクの部分を押しても閉じるようにする優しい設定
    menuModal.addEventListener('click', (e) => {
        if (e.target === menuModal) {
            menuModal.style.display = 'none';
        }
    });
</script>

</body>
</html>
