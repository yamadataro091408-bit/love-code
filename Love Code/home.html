<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home 💗</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">
<header class="home-top-header">
    <div class="home-header-content">
        <span class="home-header-title">🎀Home🎀</span>
    </div>
    <button id="open-menu-btn" class="menu-open-button">MENU</button>
</header>

<div id="menu-modal" class="menu-overlay">
    <div class="menu-window">
        <h2 class="menu-title">Menu</h2>
        <ul class="menu-list">
            <li><a href="home.html" class="current">Home</a></li>
            <li><a href="date.html">Next Date</a></li>
            <li><a href="lets-go.html">Wish List</a></li> 
            <li><a href="#">Memories</a></li>
            <li><a href="#">Goals</a></li>
            <li><a href="#">Savings</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <button id="close-btn" class="close-circle">×</button>
    </div>
</div>

<main class="home-main-content">
    <div class="photo-frame">
        <img src="image/pink.gif" alt="動くマイメロちゃん" class="main-gif">
        <img src="image/photo.jpg" alt="二人の思い出" class="main-photo">
        <p class="photo-caption">♡ BIG LOVE ♡</p>
    </div>
</main>
<div class="anniversary-container">
    <p class="anniversary-label">🎀 付き合って 🎀</p> 
    <p id="counter-text" class="anniversary-days">読み込み中...</p> 
    <p class="love-status">ฅ^>ω<^ฅ</p></div>
</div>
<div class="bottom-lace"></div>
<div class="bottom-header">
<span class="home-header-title">🐰 Love Mellow 🐻</span>
</div>
<script>
    const openBtn = document.getElementById('open-menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const menuModal = document.getElementById('menu-modal');

    // MENUボタンを押したら開く！
    openBtn.addEventListener('click', () => {
        menuModal.style.display = 'flex';
    });

    // 閉じるボタン（×）を押したら隠す！
    closeBtn.addEventListener('click', () => {
        menuModal.style.display = 'none';
    });

    // 背景のピンクの部分を押しても閉じるようにする優しい設定
    menuModal.addEventListener('click', (e) => {
        if (e.target === menuModal) {
            menuModal.style.display = 'none';
        }
    });

    function updateAnniversary() {
    // 📅 ここに「付き合った日」を入れてね！ (年, 月-1, 日)
    // ※月は 0から始まるから、3月なら「2」、10月なら「9」って書いてね！
    const startDate = new Date(2023, 11, 24);

    const now = new Date();
    
    // 💡 詳しい計算魔法（基本情報のアルゴリズムの練習にもなるよ！）
    let years = now.getFullYear() - startDate.getFullYear();
    let months = now.getMonth() - startDate.getMonth();
    let days = now.getDate() - startDate.getDate();

    if (days < 0) {
        months--;
        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += lastMonth.getDate();
    }
    if (months < 0) {
        years--;
        months += 12;
    }

    // 画面に表示させる！
    // 画面に表示させる！（「付き合って」を消して数字だけにするよ）
    const counterElement = document.getElementById('counter-text');
    counterElement.innerText = `${years}年 ${months}か月 ${days}日`;
}

// ページを開いた時に計算を実行！
updateAnniversary();
</script>

</body>
</html>
