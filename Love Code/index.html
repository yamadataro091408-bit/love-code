<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👀</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <header class="top-header">
        <div class="header-content">
            <span class="sparkle">✨</span>
            <span class="header-title">Wellcome to My site</span>
            <span class="sparkle">✨</span>
        </div>
        <div class="top-lace"></div>
    </header>

    <div class="gif-ribbon-group">
        <div class="deco-ribbon"></div>
        <div class="gif-container" style="background-image: url('image/mai.gif');"></div>
        <div class="deco-ribbon"></div>
    </div>

    <div class="login-box">
        <h1>💗合言葉を入力してね💗</h1>
        <div class="input-area">
            <input type="text" id="pass-field" placeholder="すきな食べ物">
            <p class="hint">ヒント：ひらがな</p>
            <button id="login-btn">開く</button>
        </div>
    </div>

    <div class="gif-ribbon-group">
        <div class="deco-ribbon"></div>
        <div class="gif-container" style="background-image: url('image/mai.gif');"></div>
        <div class="deco-ribbon"></div>
    </div>

    <div class="bottom-lace"></div>
    <div class="bottom-header">
<span class="home-header-title">🐰 Love Mellow 🐻</span>
</div>

    <script>
        // 文字列をハッシュ化(SHA-256)する魔法の関数
        async function sha256(text) {
            const msgUint8 = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const loginBtn = document.getElementById('login-btn');
        const passField = document.getElementById('pass-field');

        loginBtn.addEventListener('click', async () => {
            const inputHash = await sha256(passField.value);
            // 正解のハッシュ（ここはさよちゃんの秘密だね！）
            const seikaiHash = "879aecaf4b454fe451d90fad38e87ddcaf811ca30da2268d815cb3407fe7a7b1";

            if (inputHash === seikaiHash) {
                window.location.href = 'home.html';
            } else {
                alert('ちがう（#^ω^）');
                passField.value='';
            }
        });
    </script>
</body>
</html>
