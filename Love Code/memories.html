    <p class="go-label">二人の思い出アルバム</p>

    <div class="input-card">
        <input type="text" id="photo-url" placeholder="画像のURLを貼ってね💗">
        <input type="text" id="photo-caption" placeholder="一言メモ📝">
        <button onclick="addPhoto()" class="add-btn">保存</button>
    </div>

<div class="bottom-lace"></div>

<script>
    // 💡 さよちゃんが今発行してくれたURLに書き換えたよ！
    const PHOTO_API_URL = "https://script.google.com/macros/s/AKfycbxnX1GNBk0Tg-cncCDjID4RJQJAiMTWrhCJRlzICHnEJ-1osGg09cYQ_UEU_o2lhzlY/exec";

    // メニューの基本設定
    const openBtn = document.getElementById('open-menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const menuModal = document.getElementById('menu-modal');
    openBtn.onclick = () => menuModal.style.display = 'flex';
    closeBtn.onclick = () => menuModal.style.display = 'none';

    // 🌸 ページを開いた時に写真を読み込む
    window.onload = async function() {
        const gallery = document.getElementById('photo-gallery');
        gallery.innerHTML = "<p style='color:#ffb7ce;'>アルバムを開いています...💕</p>";
        
        try {
            const response = await fetch(PHOTO_API_URL);
            const photos = await response.json();
            gallery.innerHTML = ""; 
            photos.reverse().forEach(data => displayPhoto(data));
        } catch (e) {
            gallery.innerHTML = "<p style='color:#ffb7ce;'>読み込みに失敗しちゃった😢</p>";
        }
    };

    // 🌸 写真を保存する魔法
    async function addPhoto() {
        const urlInput = document.getElementById('photo-url');
        const capInput = document.getElementById('photo-caption');
        const url = urlInput.value.trim();
        const caption = capInput.value.trim();

        if (!url) return alert("画像のURLを入れてね！");

        try {
            await fetch(PHOTO_API_URL, {
                method: "POST",
                body: JSON.stringify({ url: url, caption: caption })
            });
            location.reload(); 
        } catch (e) {
            alert("保存できなかったよ💦");
        }
    }

// 🌸 画面にポラロイドを作る魔法
    function displayPhoto(data) {
        const gallery = document.getElementById('photo-gallery');
        const frame = document.createElement('div');
        frame.className = 'photo-frame'; 
        frame.style.marginBottom = "30px";
        
        // 💡 ここで cleanImageUrl を使って、住所を「本物の画像」に変換するよ！
        const finalUrl = cleanImageUrl(data.url);
        
        frame.innerHTML = `
            <img src="${finalUrl}" class="main-photo" style="display:block;">
            <p class="photo-caption">${data.caption || 'No Title'}</p>
        `;
        gallery.appendChild(frame);
    }

    // 🌸 Googleフォトなどのリンクを、画像として表示できる形式に変換する魔法
function cleanImageUrl(url) {
    if (url.includes("photos.app.goo.gl")) {
        // Googleフォトの共有リンクは特殊なので、
        // 今回は「リンク」として表示するか、別の保存方法を考える必要があるかも！
        return url; 
    }
    if (url.includes("drive.google.com")) {
        // GoogleドライブのURLを直リンクに変換する魔法！
        return url.replace("/file/d/", "/uc?export=view&id=").replace("/view?usp=sharing", "");
    }
    return url;
}

}
