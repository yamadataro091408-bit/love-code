<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR SECRET PLACE 💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login-screen" class="box">
    <h2>💗合言葉を入力してね💗</h2>
    <input type="text" id="password" placeholder="好きな食べ物">
    <p class="hint-text">ヒント：ひらがな</p>
    <br><button class="add-btn" onclick="checkPassword()">開く</button>
</div>
<script>
    // SHA-256を計算する魔法の関数
    async function sha256(text) {
        const msgUint8 = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPassword() {
        const pass = document.getElementById('password').value;
        
        // 入力された文字を暗号に変換する
        const hashedInput = await sha256(pass);
        
        // あなたが生成したSHA-256の暗号と比較
        const correctHash = "879aecaf4b454fe451d90fad38e87ddcaf811ca30da2268d815cb3407fe7a7b1"; 
        if(hashedInput === correctHash) { 
            window.location.href = "menu.html"; 
        } else {
            alert("ちがうよ！");
        }
    }
</script>
</body>
</html>
